<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0a0a" />
    <title>Login — Lolla Labs Agentes</title>
    <link rel="manifest" href="/public/manifest.json" />
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <div class="page-loader" id="pageLoader">
      <span class="loader-text">L</span>
    </div>

    <div class="login-page">
      <div class="login-box">
        <div class="login-logo animate-up">L</div>
        <div class="login-subtitle animate-up delay-1">Área dos Agentes</div>

        <div class="login-error" id="loginError"></div>

        <form id="loginForm" novalidate>
          <div class="form-group animate-up delay-1">
            <label for="email">E-mail</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="agente@lollalabs.com"
              autocomplete="email"
              required
            />
          </div>

          <div class="form-group animate-up delay-2">
            <label for="password">Senha</label>
            <div style="position: relative">
              <input
                type="password"
                id="password"
                name="password"
                placeholder="••••••••"
                autocomplete="current-password"
                required
              />
              <button
                type="button"
                id="togglePass"
                style="
                  position: absolute;
                  right: 1rem;
                  top: 50%;
                  transform: translateY(-50%);
                  color: var(--muted);
                  font-size: 0.9rem;
                  padding: 0;
                "
              >
                👁
              </button>
            </div>
          </div>

          <div class="animate-up delay-3" style="margin-top: 2rem">
            <button
              type="submit"
              class="btn btn-primary"
              id="loginBtn"
              style="width: 100%"
            >
              Entrar no painel
            </button>
          </div>
        </form>

        <div style="margin-top: 2rem; text-align: center">
          <a
            href="/"
            style="
              font-size: 0.7rem;
              color: var(--muted);
              letter-spacing: 0.1em;
            "
          >
            ← Voltar ao início
          </a>
        </div>

        <div
          style="
            margin-top: 3rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border);
          "
        >
          <div class="label" style="margin-bottom: 0.75rem; text-align: center">
            Acesso demo
          </div>
          <div
            style="
              background: var(--off-black);
              border: 1px solid var(--border);
              border-radius: var(--radius);
              padding: 0.875rem 1rem;
            "
          >
            <div style="font-size: 0.75rem; color: var(--mid); line-height: 2">
              <div>
                📧 <code style="color: var(--gold)">agente@lollalabs.com</code>
              </div>
              <div>🔑 <code style="color: var(--gold)">lolla2025</code></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="./js/api.js"></script>
    <script src="./js/auth.js"></script>
    <script src="./js/app.js"></script>
    <script>
      // Toggle password visibility
      document
        .getElementById("togglePass")
        .addEventListener("click", function () {
          const input = document.getElementById("password");
          input.type = input.type === "password" ? "text" : "password";
        });

      document
        .getElementById("loginForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const btn = document.getElementById("loginBtn");
          const errorEl = document.getElementById("loginError");
          errorEl.style.display = "none";

          const email = document.getElementById("email").value.trim();
          const password = document.getElementById("password").value;

          if (!email || !password) {
            errorEl.textContent = "Preencha e-mail e senha.";
            errorEl.style.display = "block";
            return;
          }

          btn.classList.add("btn-loading");
          btn.disabled = true;

          try {
            const res = await fetch("/api/login", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ email, password }),
            });

            const data = await res.json();

            if (!res.ok) throw new Error(data.error || "Credenciais inválidas");

            // Save token
            localStorage.setItem("lolla_token", data.token);
            localStorage.setItem(
              "lolla_agent",
              JSON.stringify({ email: data.email, name: data.name }),
            );

            showToast("Bem-vindo ao painel!", "success");
            setTimeout(() => {
              window.location.href = "/agentes";
            }, 800);
          } catch (err) {
            errorEl.textContent = err.message;
            errorEl.style.display = "block";
          } finally {
            btn.classList.remove("btn-loading");
            btn.disabled = false;
          }
        });
    </script>
  </body>
</html>
