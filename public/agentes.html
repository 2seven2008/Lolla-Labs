<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#111111" />
    <title>Painel de Agentes — Lolla Labs</title>
    <link rel="manifest" href="./manifest.json" />
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <div class="page-loader" id="pageLoader">
      <span class="loader-text">L</span>
    </div>

    <!-- Panel Header -->
    <div class="panel-header">
      <div class="panel-title">
        Lolla
        <em
          style="
            font-family: var(--font-display);
            font-style: italic;
            color: var(--gold);
          "
          >Labs</em
        >
      </div>
      <div style="display: flex; align-items: center; gap: 1rem">
        <div class="panel-stats" id="statsBar">
          <div class="stat-badge">Total <span id="totalCount">—</span></div>
          <div class="stat-badge">
            Pendentes <span id="pendingCount">—</span>
          </div>
        </div>
        <button class="btn btn-ghost btn-sm" id="logoutBtn">Sair</button>
      </div>
    </div>

    <!-- Filters -->
    <div class="filters">
      <button class="filter-btn active" data-filter="todos">Todos</button>
      <button class="filter-btn" data-filter="pendente">Pendentes</button>
      <button class="filter-btn" data-filter="aprovado">Aprovados</button>
      <button class="filter-btn" data-filter="rejeitado">Rejeitados</button>
      <button class="filter-btn" data-filter="street">Street</button>
      <button class="filter-btn" data-filter="fashion">Fashion</button>
      <button class="filter-btn" data-filter="casual">Casual</button>
      <button class="filter-btn" data-filter="sport">Sport</button>
      <button class="filter-btn" data-filter="editorial">Editorial</button>
    </div>

    <!-- Looks Grid -->
    <div class="looks-grid" id="looksGrid">
      <div class="empty-state">
        <div class="empty-state-icon" style="animation: pulse 1.2s infinite">
          L
        </div>
        <p>Carregando looks...</p>
      </div>
    </div>

    <!-- Look Detail Modal -->
    <div class="modal-overlay" id="lookModal">
      <div class="modal">
        <div class="modal-handle"></div>

        <div class="modal-image">
          <img id="modalImg" src="" alt="Look" />
        </div>

        <div class="modal-info">
          <div
            id="modalStatus"
            class="look-card-status"
            style="display: inline-block; margin-bottom: 1rem"
          ></div>
          <h3 id="modalNome"></h3>
          <div class="modal-meta" id="modalMeta"></div>
          <div class="modal-desc" id="modalDesc"></div>
          <div
            style="font-size: 0.7rem; color: var(--muted); margin-top: 0.75rem"
            id="modalDate"
          ></div>
        </div>

        <!-- Existing comment -->
        <div id="existingComment" style="display: none; margin-bottom: 1.25rem">
          <div class="label" style="margin-bottom: 0.5rem">
            Comentário do agente
          </div>
          <div
            id="existingCommentText"
            class="modal-desc"
            style="border-left-color: var(--gold-dim)"
          ></div>
        </div>

        <!-- Comment input -->
        <div class="modal-comment" id="commentSection">
          <label for="agentComment">Comentário do agente</label>
          <textarea
            id="agentComment"
            placeholder="Adicione observações sobre o look..."
            rows="3"
          ></textarea>
        </div>

        <!-- Actions -->
        <div class="modal-actions" id="modalActions">
          <div class="modal-actions-row">
            <button class="btn btn-success" id="approveBtn">✓ Aprovar</button>
            <button class="btn btn-danger" id="rejectBtn">✕ Rejeitar</button>
          </div>
          <button class="btn btn-ghost" onclick="closeModal()">Fechar</button>
        </div>
      </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="./js/api.js"></script>
    <script src="./js/auth.js"></script>
    <script src="./js/app.js"></script>
    <script>
      let allLooks = [];
      let currentFilter = "todos";
      let currentLookId = null;

      // ─── Auth Guard ───────────────────────────────────────
      const token = localStorage.getItem("lolla_token");
      if (!token) window.location.href = "/login";

      document.getElementById("logoutBtn").addEventListener("click", () => {
        localStorage.removeItem("lolla_token");
        localStorage.removeItem("lolla_agent");
        window.location.href = "/login";
      });

      // ─── Load Looks ───────────────────────────────────────
      async function loadLooks() {
        try {
          const res = await fetch("/api/looks", {
            headers: { Authorization: `Bearer ${token}` },
          });

          if (res.status === 401) {
            localStorage.removeItem("lolla_token");
            window.location.href = "/login";
            return;
          }

          const data = await res.json();
          allLooks = data.looks || [];
          updateStats();
          renderLooks();
        } catch (err) {
          document.getElementById("looksGrid").innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">⚠</div>
            <h3>Erro ao carregar</h3>
            <p>Verifique sua conexão e tente novamente</p>
          </div>`;
        }
      }

      function updateStats() {
        document.getElementById("totalCount").textContent = allLooks.length;
        document.getElementById("pendingCount").textContent = allLooks.filter(
          (l) => l.status === "pendente",
        ).length;
      }

      function renderLooks() {
        const grid = document.getElementById("looksGrid");
        let filtered = allLooks;

        if (currentFilter !== "todos") {
          filtered = allLooks.filter(
            (l) => l.status === currentFilter || l.categoria === currentFilter,
          );
        }

        if (filtered.length === 0) {
          grid.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">○</div>
            <h3>Nenhum look</h3>
            <p>Nenhum resultado para este filtro</p>
          </div>`;
          return;
        }

        grid.innerHTML = filtered
          .map(
            (look) => `
        <div class="look-card" onclick="openModal('${look._id}')">
          <div class="look-card-image">
            <img src="${look.imagem_url}" alt="${escapeHtml(look.nome)}" loading="lazy">
            <div class="look-card-status status-${look.status}">${look.status}</div>
          </div>
          <div class="look-card-body">
            <div class="look-card-name">${escapeHtml(look.nome)}</div>
            <div class="look-card-meta">
              <span class="look-card-tag">${look.categoria}</span>
              <span class="look-card-tag">${look.altura}cm</span>
              <span class="look-card-tag">${escapeHtml(look.cidade)}</span>
            </div>
            <div class="look-card-desc">${escapeHtml(look.descricao)}</div>
            <div class="look-card-footer">
              <span class="look-card-date">${formatDate(look.data_envio)}</span>
              <div class="look-card-actions">
                ${
                  look.status === "pendente"
                    ? `
                  <button class="btn btn-success btn-sm" onclick="event.stopPropagation(); quickAnalyze('${look._id}', 'aprovado')">✓</button>
                  <button class="btn btn-danger btn-sm"  onclick="event.stopPropagation(); quickAnalyze('${look._id}', 'rejeitado')">✕</button>
                `
                    : ""
                }
              </div>
            </div>
          </div>
        </div>
      `,
          )
          .join("");
      }

      // ─── Filters ──────────────────────────────────────────
      document.querySelectorAll(".filter-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          document
            .querySelectorAll(".filter-btn")
            .forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");
          currentFilter = btn.dataset.filter;
          renderLooks();
        });
      });

      // ─── Modal ────────────────────────────────────────────
      function openModal(id) {
        const look = allLooks.find((l) => l._id === id);
        if (!look) return;
        currentLookId = id;

        document.getElementById("modalImg").src = look.imagem_url;
        document.getElementById("modalNome").textContent = look.nome;
        document.getElementById("modalStatus").textContent = look.status;
        document.getElementById("modalStatus").className =
          `look-card-status status-${look.status}`;
        document.getElementById("modalDate").textContent =
          `Enviado em ${formatDate(look.data_envio)}`;
        document.getElementById("modalDesc").textContent = look.descricao;

        document.getElementById("modalMeta").innerHTML = `
        <span class="look-card-tag">${look.categoria}</span>
        <span class="look-card-tag">${look.altura}cm</span>
        <span class="look-card-tag">${escapeHtml(look.cidade)}</span>
      `;

        // Existing comment
        const existingComment = document.getElementById("existingComment");
        const existingCommentText = document.getElementById(
          "existingCommentText",
        );
        if (look.comentario_agente) {
          existingCommentText.textContent = look.comentario_agente;
          existingComment.style.display = "block";
        } else {
          existingComment.style.display = "none";
        }

        document.getElementById("agentComment").value =
          look.comentario_agente || "";

        // Hide action buttons if already analyzed
        const actionsDiv = document.getElementById("modalActions");
        const commentSection = document.getElementById("commentSection");
        if (look.status !== "pendente") {
          actionsDiv.innerHTML = `<button class="btn btn-ghost" onclick="closeModal()">Fechar</button>`;
          commentSection.style.display = "none";
        } else {
          commentSection.style.display = "block";
          actionsDiv.innerHTML = `
          <div class="modal-actions-row">
            <button class="btn btn-success" id="approveBtn" onclick="analyzeLook('aprovado')">✓ Aprovar</button>
            <button class="btn btn-danger"  id="rejectBtn"  onclick="analyzeLook('rejeitado')">✕ Rejeitar</button>
          </div>
          <button class="btn btn-ghost" onclick="closeModal()">Fechar</button>
        `;
        }

        document.getElementById("lookModal").classList.add("open");
        document.body.style.overflow = "hidden";
      }

      function closeModal() {
        document.getElementById("lookModal").classList.remove("open");
        document.body.style.overflow = "";
        currentLookId = null;
      }

      document.getElementById("lookModal").addEventListener("click", (e) => {
        if (e.target === document.getElementById("lookModal")) closeModal();
      });

      // ─── Analyze Look ─────────────────────────────────────
      async function analyzeLook(status) {
        if (!currentLookId) return;
        const comentario = document.getElementById("agentComment").value.trim();
        await doAnalyze(currentLookId, status, comentario);
        closeModal();
      }

      async function quickAnalyze(id, status) {
        await doAnalyze(id, status, "");
      }

      async function doAnalyze(id, status, comentario) {
        try {
          const res = await fetch("/api/analisar-look", {
            method: "PATCH",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${token}`,
            },
            body: JSON.stringify({ id, status, comentario_agente: comentario }),
          });

          if (!res.ok) throw new Error("Erro ao analisar");

          // Update local state
          const idx = allLooks.findIndex((l) => l._id === id);
          if (idx >= 0) {
            allLooks[idx].status = status;
            if (comentario) allLooks[idx].comentario_agente = comentario;
          }

          updateStats();
          renderLooks();
          showToast(
            status === "aprovado" ? "Look aprovado!" : "Look rejeitado.",
            status === "aprovado" ? "success" : "error",
          );
        } catch (err) {
          showToast("Erro ao analisar look.", "error");
        }
      }

      // ─── Utils ────────────────────────────────────────────
      function formatDate(dateStr) {
        if (!dateStr) return "—";
        const d = new Date(dateStr);
        return d.toLocaleDateString("pt-BR", {
          day: "2-digit",
          month: "short",
          year: "numeric",
        });
      }

      function escapeHtml(str) {
        const div = document.createElement("div");
        div.textContent = str;
        return div.innerHTML;
      }

      // ─── Init ────────────────────────────────────────────
      loadLooks();
      // Refresh every 60s
      setInterval(loadLooks, 60000);
    </script>
  </body>
</html>
